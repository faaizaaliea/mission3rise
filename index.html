<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>videobelajar Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <a href="home.html" class="brand">
        <img src="assets/Logo.png" alt="videobelajar" />
      </a>
    </header>

    <main class="page-shell">
      <section class="login-card" aria-labelledby="login-title">
        <div class="card-heading">
          <h1 id="login-title">Masuk ke Akun</h1>
          <p>Yuk, lanjutin belajarmu di videobelajar.</p>
        </div>

        <form class="login-form" id="loginForm" novalidate>
          <div class="field">
            <label for="email">E-Mail <span aria-hidden="true">*</span></label>
            <input id="email" name="email" type="email" autocomplete="email" value="babymonster@yg.co.id" required />
            <p class="error-message" id="emailError"></p>
          </div>

          <div class="field">
            <label for="password">Kata Sandi <span aria-hidden="true">*</span></label>
            <div class="password-wrap">
              <input id="password" name="password" type="password" autocomplete="current-password" value="videobelajar" required minlength="8" />
              <button class="icon-button" type="button" id="togglePassword" aria-label="Tampilkan kata sandi" title="Tampilkan kata sandi">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 3l18 18" />
                  <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8" />
                  <path d="M9.3 5.4A10.5 10.5 0 0 1 12 5c5 0 8.7 4.4 10 7-0.5 1-1.5 2.4-3 3.7" />
                  <path d="M6.5 6.8C4.3 8.3 2.9 10.5 2 12c1.3 2.6 5 7 10 7 1.6 0 3.1-0.5 4.4-1.2" />
                </svg>
              </button>
            </div>
            <p class="error-message" id="passwordError"></p>
          </div>

          <a class="forgot-link" href="#">Lupa Password?</a>
          <button class="primary-button" type="submit">Masuk</button>
          <button class="secondary-button" type="button" onclick="window.location.href='register.html'">Daftar</button>

          <div class="divider" role="separator"><span>atau</span></div>

          <button type="button" class="google-button">
            <img src="assets/Google.png" alt="Google" />
            <span>Masuk dengan Google</span>
          </button>
        </form>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="js/index.js"></script>
  </body>
</html>
